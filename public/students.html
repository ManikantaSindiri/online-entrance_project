<!DOCTYPE html>
<html>

<head>
    <title>Registered Students</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Registered Students</h1>

        <table border="1" width="100%" id="studentTable">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Course</th>
            </tr>

        </table>

    </div>

    <script>

        async function loadStudents() {

            const response = await fetch("/students");

            const data = await response.json();

            const table = document.getElementById("studentTable");

            data.forEach((student) => {

                table.innerHTML += `
                    <tr>
                        <td>${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.email}</td>
                        <td>${student.phone}</td>
                        <td>${student.course}</td>
                    </tr>
                `;
            });
        }

        loadStudents();

    </script>

</body>

</html>
